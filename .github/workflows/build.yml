name: Build

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: |
          for attempt in 1 2 3; do
            echo "Gradle build attempt ${attempt}/3"
            if ./gradlew build --no-daemon --no-configuration-cache --refresh-dependencies; then
              exit 0
            fi
            sleep $((attempt * 15))
          done
          exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emi-accelerator
          path: build/libs/emi_accelerator-*.jar

  release:
    if: startsWith(github.ref_name, 'v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release
        run: |
          for attempt in 1 2 3; do
            echo "Gradle release build attempt ${attempt}/3"
            if ./gradlew build --no-daemon --no-configuration-cache --refresh-dependencies; then
              exit 0
            fi
            sleep $((attempt * 15))
          done
          exit 1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: EMI Accelerator ${{ github.ref_name }}
          body: |
            See [CHANGELOG](CHANGELOG.md) for details.
          files: build/libs/emi_accelerator-*.jar
          generate_release_notes: true
